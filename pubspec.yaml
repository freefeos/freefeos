name: freefeos
description: "FreeFEOS is a Flutter plugin, a simple Flutter library operating system and an advanced Flutter development framework that can provide many advanced features for applications."
version: 0.2.6
homepage: https://github.com/freefeos/freefeos
repository: https://github.com/freefeos/freefeos
issue_tracker: https://github.com/freefeos/freefeos/issues
documentation: https://github.com/freefeos/freefeos/blob/master/README.md

environment:
  sdk: ^3.5.0
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  flutter_plugin_android_lifecycle: ^2.0.23
  flutter_rust_bridge: ^2.5.1
  irondash_engine_context: ^0.5.4
  irondash_message_channel: ^0.7.0
  vm_service: ^14.2.5
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  package_info_plus: ^8.1.0
  url_launcher: ^6.3.1
  flutter_adaptive_scaffold: ^0.3.1
  animations: ^2.0.11
  logging: ^1.3.0
  stack_trace: ^1.11.1
  toastification: ^2.3.0
  intl: ^0.19.0
  window_manager: ^0.4.3
  win32: ^5.8.0
  ffi: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  ffigen: ^15.0.0

flutter:
  uses-material-design: true
  generate: true
  plugin:
    platforms:
      android:
        package: com.freefeos.freefeos
        dartPluginClass: FreeFEOSRegister
        pluginClass: FreeFEOSEmbedder
        ffiPlugin: true
      ios:
        dartPluginClass: FreeFEOSRegister
        pluginClass: FreeFEOSEmbedder
        ffiPlugin: true
      linux:
        dartPluginClass: FreeFEOSRegister
        ffiPlugin: true
      macos:
        dartPluginClass: FreeFEOSRegister
        ffiPlugin: true
      windows:
        dartPluginClass: FreeFEOSRegister
        ffiPlugin: true
  assets:
    - README.md
    - CHANGELOG.md
    - LICENSE
    - AUTHORS

screenshots:
  - description: "App screenshot on Android"
    path: assets/screenhots/screenhot_android_app.png
  - description: "Manager screenshot on Android"
    path: assets/screenhots/screenhot_android_mgr.png
  - description: "App screenshot on iOS"
    path: assets/screenhots/screenhot_ios_app.png
  - description: "Manager screenshot on iOS"
    path: assets/screenhots/screenhot_ios_mgr.png
  # - description: "App screenshot on Linux"
  #   path: assets/screenhots/screenhot_ios_app.png
  # - description: "Manager screenshot on Linux"
  #   path: assets/screenhots/screenhot_ios_mgr.png
  - description: "App screenshot on macOS"
    path: assets/screenhots/screenhot_macos_app.png
  - description: "Manager screenshot on macOS"
    path: assets/screenhots/screenhot_macos_mgr.png
  - description: "App screenshot on Windows"
    path: assets/screenhots/screenhot_windows_app.png
  - description: "Manager screenshot on Windows"
    path: assets/screenhots/screenhot_windows_mgr.png

topics:
  - framework
  - flutter
  - libraryos
